# Reference run: photons over the full energy range into a thick block, for a
# list of materials. The same experiment is run once per material and each
# result is written to its own ntuple, tagged with the material's atomic number.
#
# Every key is optional; the values below are the defaults. Numeric values may
# carry any Geant4 unit. Each output file name is derived from the material,
# energy range and number of events, so the per-material runs never overwrite
# each other. Note the name does NOT encode the geometry, so two runs differing
# only in block size overwrite each other -- set outputName explicitly (single
# material only) if you want to keep both.

# Block material list: whitespace- or comma-separated NIST names. Use
# single-element materials so the recorded Z is unambiguous. When run directly
# the executable loops over the whole list; run_materials.sh instead overrides
# this with one material per invocation.
materials      = G4_Si G4_Ge G4_Fe G4_W G4_Pb

# Block geometry. Only the thickness matters physically: the photon travels
# along z on axis, and the pair is killed as soon as it is recorded, so
# blockWidth never contains anything. 10 m is far thicker than the conversion
# mean free path in any of these materials, so essentially every photon converts.
blockThickness = 10 m
blockWidth     = 1 m

# Photon energy, sampled log-uniformly in [minEnergy, maxEnergy].
# Set the two equal for a mono-energetic run. minEnergy must be at or above
# the 1.022 MeV conversion threshold; 1 GeV avoids the region where the cross
# section is so small that almost nothing converts.
minEnergy      = 1 GeV
maxEnergy      = 100 GeV

nEvents        = 10000000
nThreads       = 10

# BetheHeitler5D    full 5-dimensional final state (use this for angles)
# PairProductionRel relativistic approximation, emits an exactly coplanar pair
model          = BetheHeitler5D

# Which target the photon converts on (BetheHeitler5D only):
#   mixed    nuclear and triplet in their natural 1/(Z+1) ratio
#   nuclear  nuclear only, so the final state is always a clean two-body pair
#   triplet  triplet only, on an atomic electron
# Triplet events are flagged by the isTriplet column either way.
conversionType = mixed

# Ntuples are collected here; e.g. ntuples/Si_2MeV-100GeV_10000000.root
outputDir      = ntuples
# outputName   = myRun          # overrides the derived name (single material)

# Everything Geant4 prints is teed to logs/<same name>.log, master and worker
# threads alike, while still going to the terminal
logDir         = logs
