# Reference run: photons over the full energy range into 1 m of silicon.
#
# Every key is optional; the values below are the defaults. Numeric values may
# carry any Geant4 unit. The output file name is derived from material, energy
# range and number of events, so runs with different settings never collide.

# Block: any NIST material name, and its full dimensions
material       = G4_Si
blockThickness = 1 m
blockWidth     = 1 m

# Photon energy, sampled log-uniformly in [minEnergy, maxEnergy].
# Set the two equal for a mono-energetic run. minEnergy must be at or above
# the 1.022 MeV conversion threshold; 2 MeV avoids the region where the cross
# section is so small that almost nothing converts.
minEnergy      = 2 MeV
maxEnergy      = 10 GeV

nEvents        = 100000
nThreads       = 10

# BetheHeitler5D    full 5-dimensional final state (use this for angles)
# PairProductionRel relativistic approximation, emits an exactly coplanar pair
model          = BetheHeitler5D

# Which target the photon converts on (BetheHeitler5D only):
#   mixed    nuclear and triplet in their natural 1/Z ratio (~7% triplet in Si)
#   nuclear  nuclear only, so the final state is always a clean two-body pair
#   triplet  triplet only, on an atomic electron
# Triplet events are flagged by the isTriplet column either way.
conversionType = mixed

# Ntuples are collected here; the file below would be
# ntuples/Si_2MeV-10GeV_100000.root
outputDir      = ntuples
# outputName   = myRun          # overrides the derived name if set

# Everything Geant4 prints is teed to logs/<same name>.log, master and worker
# threads alike, while still going to the terminal
logDir         = logs
