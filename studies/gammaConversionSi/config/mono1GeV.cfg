# Mono-energetic 1 GeV run: the cleanest way to read off the conversion mean
# free path, since pathInBlock is then a pure exponential.
# Produces ntuples/Si_1GeV_50000.root

material       = G4_Si
blockThickness = 1 m
blockWidth     = 1 m

minEnergy      = 1 GeV
maxEnergy      = 1 GeV

nEvents        = 50000
nThreads       = 10

model          = BetheHeitler5D
outputDir      = ntuples
