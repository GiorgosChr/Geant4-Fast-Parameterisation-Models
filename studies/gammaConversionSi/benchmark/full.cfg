# Benchmark, full simulation: Geant4 G4GammaConversion (BetheHeitler5D).
#
# One experiment of the 100 x 1e6 timing study. Same geometry and spectrum as
# config/default.cfg (10 m Si, 2 MeV - 100 GeV), single-threaded for a clean
# per-experiment wall time, and a fixed outputName so repeated experiments
# overwrite one ntuple (the last survives as the closure sample) instead of
# filling the disk with 100 copies.
material       = G4_Si
blockThickness = 10 m
blockWidth     = 1 m

minEnergy      = 2 MeV
maxEnergy      = 100 GeV

nEvents        = 1000000
nThreads       = 1

model          = BetheHeitler5D
conversionType = mixed
simMode        = full

outputDir      = ntuples
outputName     = benchmark_full
logDir         = logs
