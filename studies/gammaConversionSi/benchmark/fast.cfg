# Benchmark, fast simulation: the normalising-flow ConvFastSimModel.
#
# Identical to full.cfg except simMode = fast: the conversion point is still
# sampled from the real pair-production cross section (same rate as the full
# run), but the pair kinematics come from the trained flow via ONNX Runtime.
# flowModelDir defaults to models/onnx, copied next to the executable by CMake.
material       = G4_Si
blockThickness = 10 m
blockWidth     = 1 m

minEnergy      = 2 MeV
maxEnergy      = 100 GeV

nEvents        = 1000000
nThreads       = 1

model          = BetheHeitler5D
conversionType = mixed
simMode        = fast
flowModelDir   = models/onnx

outputDir      = ntuples
outputName     = benchmark_fast
logDir         = logs
